spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  h2:
    console:
      enabled: true
      path: /h2-console

# Banco 1 - pessoas_db (simula PostgreSQL)
datasource:
  primary:
    jdbc-url: jdbc:h2:mem:pessoas_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

# Banco 2 - logs_db (simula MySQL)
  secondary:
    jdbc-url: jdbc:h2:mem:logs_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

# Banco 3 - relatorios_db (simula PostgreSQL)
  tertiary:
    jdbc-url: jdbc:h2:mem:relatorios_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

jpa:
  hibernate:
    ddl-auto: create-drop
  show-sql: true
  properties:
    hibernate:
      dialect: org.hibernate.dialect.H2Dialect
      format_sql: true
